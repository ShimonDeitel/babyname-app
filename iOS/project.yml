name: BabynameShortlist
options:
  bundleIdPrefix: com.shimondeitel.babyname
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "4"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  BabynameShortlist:
    type: application
    platform: iOS
    sources:
      - path: BabynameShortlist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.babyname
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: BabynameShortlist/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  BabynameShortlistTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: BabynameShortlistTests
    dependencies:
      - target: BabynameShortlist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.babyname.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  BabynameShortlistUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: BabynameShortlistUITests
    dependencies:
      - target: BabynameShortlist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.babyname.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  BabynameShortlist:
    build:
      targets:
        BabynameShortlist: all
        BabynameShortlistTests: [test]
        BabynameShortlistUITests: [test]
    test:
      targets:
        - BabynameShortlistTests
        - BabynameShortlistUITests
